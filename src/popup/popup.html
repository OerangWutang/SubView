<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrialGuard</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; margin: 12px; width: 340px; }
    h1 { margin: 0 0 8px; font-size: 16px; }
    .muted { color: #4b5563; font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
    .section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #e5e7eb; }
    ul { padding-left: 0; margin: 8px 0 0; max-height: 200px; overflow: auto; list-style: none; }
    button { border: 1px solid #d1d5db; border-radius: 8px; background: #fff; padding: 6px 10px; cursor: pointer; }
    .sub-item { padding: 8px; margin-bottom: 6px; border: 1px solid #e5e7eb; border-radius: 8px; }
    .sub-name { font-weight: 600; font-size: 13px; }
    .sub-details { font-size: 12px; color: #4b5563; margin-top: 2px; }
    .sub-tos { font-size: 12px; color: #92400e; margin-top: 2px; }
    .spending-summary { font-size: 13px; font-weight: 600; color: #111827; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>TrialGuard</h1>
  <div class="row">
    <input id="enabled" type="checkbox" />
    <label for="enabled">Enable detection</label>
  </div>
  <div class="row">
    <input id="debugOverlay" type="checkbox" />
    <label for="debugOverlay">Debug overlay</label>
  </div>
  <div class="section">
    <strong>Active subscriptions</strong>
    <ul id="reminders"></ul>
    <div id="spendingSummary" class="spending-summary"></div>
  </div>
  <div class="section">
    <strong>Recent detections</strong>
    <ul id="detections"></ul>
  </div>
  <div class="section muted">Privacy-first: detection runs locally. No page content is uploaded.</div>
  <div class="section">
    <button id="openOptions" type="button">Open options</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
